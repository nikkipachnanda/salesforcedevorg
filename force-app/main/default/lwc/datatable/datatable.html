<template>
    <lightning-datatable
            key-field="id"
            columns={columns}
            data={data}
            hide-checkbox-column = "false"
            default-sort-direction={defaultSortDirection}
            sorted-direction={sortDirection}
            sorted-by={sortedBy}
            onsort={onHandleSort}
              show-row-number-column
                row-number-offset={rowOffset}
                suppress-bottom-bar
                draft-values={draftValues}
            
            >
    </lightning-datatable>
</template>
