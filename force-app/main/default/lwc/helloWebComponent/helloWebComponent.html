            <h2>Hello {greeting} <span>Today is {currentDate}</span></h2>

			<lightning-input label="Name" value={greeting} onchange={handleGreetingChange}></lightning-input>
		</div>
	</lightning-card>

	<slot name="parentTag"></slot>
</template>
