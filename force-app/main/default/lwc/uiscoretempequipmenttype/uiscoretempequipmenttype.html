<template>
    <div>
    <!-- progress path -->
            <div class="wrapperScoreHeaderBgCont">
                <div class="wrapperScoreHeader progressBarCont">
                    <lightning-progress-indicator current-step="1" type="base" variant="base">
                        <span class="posRel slds-show_large"><lightning-progress-step label="Step 1" value="1"></lightning-progress-step> <span class="proTextF slds-show_large">Add PO <br/> Number </span>
                        </span>
                    <span class="posRel slds-m-top_xx-small slds-show_large"><lightning-progress-step label="Step 2" value="2"></lightning-progress-step> <span class="proTextS slds-show_large">Equipment<br/> & Carrier Detail </span>
                        </span>
                    <span class="posRel slds-show_large"><lightning-progress-step label="Step 4" value="3"></lightning-progress-step> <span class="proTextS slds-show_large">Temperature
                    <br/> Check </span>
                        </span>
                <span class="posRel slds-show_large"><lightning-progress-step label="Step 4" value="4"></lightning-progress-step> <span class="proTextS slds-show_large">Review & Confirm <br/> Details </span>
                        </span>
                    </lightning-progress-indicator>
                </div>
            </div> 
         <!-- progress path end -->

        <!-- mid section start -->
        <div class="wrapperScoreMidBgCont">
            <div class="wrapperScoreMidCont">
                <h1 class="slds-m-top_large"> Equipment Detail </h1>
                <div class="boxBgCont">
                
                    <div class=" slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-1 slds-large-size_6-of-12">
                           <div class="slds-form-element">
                             <div class="slds-form-element__control">
                                    <lightning-combobox
                                        name="equipmentType"
                                        label="Select Equipment Type"
                                        value={selectedEquipmentType}
                                        options={equipmentTypeOptions}
                                        onchange={handleEquipmentTypeChange}
                                        required
                                    ></lightning-combobox>
                            
                            </div>

                            <div class="slds-m-top_medium">
                                <lightning-input type="text" variant="standard" name="name"  label="Tailer Number"
                                placeholder="" value=""></lightning-input>                                
                            </div>

                            <div class="slds-m-top_medium">
                                <lightning-input type="text" variant="standard" name="name" required  label="Container Number"
                                placeholder="" value=""></lightning-input>                                
                            </div>

                             <div class="slds-m-top_medium">
                                <lightning-input type="text" variant="standard" name="name"   label="Dock Number"
                                placeholder="" value=""></lightning-input>                                
                            </div>

                             <div class="slds-m-top_medium">
                                <lightning-input type="text" variant="standard" name="name"   label="Specify Other"
                                placeholder="" value=""></lightning-input>                                
                            </div>


                           </div>
                        </div>
                    </div>
            
                </div>

                <h1 class="slds-m-top_medium"> Carrier Detail </h1>
                <div class="boxBgCont">
                  
                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-1 slds-large-size_6-of-12">
                            <lightning-input type="text" variant="standard" name="name" required label="Carrier Name"
                                placeholder="" value="Primary Connect"></lightning-input>
                        </div>
                    </div>
                   

                </div>

            </div>
        </div>
        <!-- mid section end -->

        <!-- footer section start -->
        <div class="wrapperFooterBgCont">
            <div class="wrapperScoreFooterCont">
                <div class="alignHorizontal alignRight slds-m-top_medium">
                    <lightning-button variant="brand-outline" label="Previous" title="" onclick={handleClick} class="slds-m-left_x-small">
                    </lightning-button>
                    <lightning-button variant="brand" label="Next" title="Next" onclick={handleClick}>
                    </lightning-button>
                </div>
            </div>
        </div>
        <!-- footer section end -->
    </div>
</template>
