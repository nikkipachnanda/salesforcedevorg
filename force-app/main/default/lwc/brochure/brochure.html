<template>
    <div class="slds-theme_default brochureCont">
       <center>
            <lightning-button label="Brochure" variant="brand" onclick={openmodal}></lightning-button>
        </center>

        <div if:true={openmodel}>
            <div class="demo-only" style="height: 640px;">
                <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
                    aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                    <div class="slds-modal__container">
                        <header class="slds-modal__header">
                            <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                                title="Close" onclick={closeModal}>
                                <lightning-icon icon-name="utility:close" size="medium">
                                </lightning-icon>
                                <span class="slds-assistive-text">Close</span>
                            </button>

                            <h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">Brochure Download
                            </h2>
                        </header>
                        <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                            <div class="slds-text-align_center linkedinBtn">
                                <lightning-button label="Autofill with linkedin" variant="brand"></lightning-button>
                            </div>


                            <div class="brochureForm">
                                <div class="slds-grid slds-wrap slds-gutters">
                                    <div class="slds-col slds-size_1-of-1 slds-large-size_6-of-12 ">
                                        <lightning-input type="text" placeholder="First Name" name="input1" label="">
                                        </lightning-input>
                                    </div>

                                    <div class="slds-col slds-size_1-of-1 slds-large-size_6-of-12 ">
                                        <lightning-input type="text" placeholder="Last Name" name="input1" label="">
                                        </lightning-input>
                                    </div>
                                </div>
                                <div class="slds-grid slds-wrap slds-gutters">
                                    <div class="slds-col slds-size_1-of-1 slds-large-size_12-of-12 activecol ">
                                        <lightning-input type="text" placeholder="Graphic Designer" name="input1"
                                            label=""></lightning-input>
                                    </div>
                                </div>

                                <div class="slds-grid slds-wrap slds-gutters">
                                    <div class="slds-col slds-size_1-of-1 slds-large-size_12-of-12 ">
                                        <lightning-input type="text" placeholder="Organisation" name="input1" label="">
                                        </lightning-input>
                                    </div>
                                </div>

                                <div class="slds-grid slds-wrap slds-gutters">
                                    <div class="slds-col slds-size_1-of-1 slds-large-size_12-of-12 ">
                                        <lightning-input type="text" placeholder="Email" name="input1" label="">
                                        </lightning-input>
                                    </div>
                                </div>

                                <div class="slds-grid slds-wrap slds-gutters">
                                    <div class="slds-col slds-size_1-of-1 slds-large-size_12-of-12 ">
                                        <lightning-input type="text" placeholder="Telephone" name="input1" label="">
                                        </lightning-input>
                                    </div>
                                </div>

                                <div class="slds-grid slds-wrap slds-gutters slds-m-top_large">
                                        <div class="slds-col slds-size_1-of-1 slds-large-size_12-of-12 ">
                                            <lightning-input type="checkbox" placeholder="" name="input1" label="I am a vendor interested in sponsoring this event">
                                            </lightning-input>
                                        </div>

                                       <div class="slds-col slds-size_1-of-1 slds-large-size_12-of-12 slds-m-top_medium">
                                            <lightning-input type="checkbox" placeholder="" name="input1" label="I do not wish to receive further email communications">
                                            </lightning-input>
                                        </div>
                                    </div>
                            </div>
                        </div>
                        <footer class="slds-modal__footer">
                            <lightning-button label="DOWNLOAD" variant="brand"></lightning-button>
                        </footer>
                    </div>
                </section>
                <div class="slds-backdrop slds-backdrop_open"></div>
            </div>
        </div>
    </div>
</template>
