<template>
    <lightning-button label="Open Modal" onclick={openModal}></lightning-button>

    <template if:true={isModalOpen}>
        <section class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">Modal Header</h2>
                </header>

                <div class={containerClass}
                     data-id="scrollable"
                     onscroll={handleScroll}
                     onmousedown={handleMouseDown}
                     style="max-height: 300px; overflow-y: auto; border: 1px solid #ccc; padding: 1rem;">

                   <lightning-combobox
    name="combo"
    label="Select Option"
    data-id="combo"
    class={comboboxClass}
    value={value}
    options={options}
    onchange={handleChange}>
</lightning-combobox>


<!-- Hidden dummy element to shift focus -->
<button data-id="focus-shift" class="slds-hide" tabindex="-1"></button>

                    <div style="height: 1000px;"></div>
                </div>

                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={closeModal}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
