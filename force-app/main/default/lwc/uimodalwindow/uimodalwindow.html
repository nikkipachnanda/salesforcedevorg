<template>
    
    <!-- Modal will open on click of this modal -->
    <lightning-button name="showModal" label="Show Modal" onclick={showModal} variant="brand" class="slds-m-around_small"></lightning-button>

    <!-- This Modal will only be visible if showModal is set to true -->
    <template if:true={openModal}>
        <section aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container sldsModalCont">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_small">Download</h2>
                    <lightning-icon class="slds-modal__close" icon-name="utility:close" size="small" onclick={closeModal}></lightning-icon>
                </header>
                <div class="slds-modal__content">
                    <div class="slds-p-around_small">
                  	<p>
												You’re about to download this spreadsheet document
												</p>
                    </div>
                </div>
							
                <footer class="slds-modal__footer" style="background:#fff;">
                   <div class="slds-m-top_large">
											     <lightning-button variant="success" label="Cancel" title="Cancel"  class=" secondaryBtn slds-m-right_large"></lightning-button>
        										<lightning-button variant="success" label="Confirm" title="Confirm"  class=" primaryBtn"></lightning-button>
    										</div>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
