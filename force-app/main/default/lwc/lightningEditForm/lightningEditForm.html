<template>
    <lightning-card  title="Lightning Card">
        <div>Lightning Edit Record Form</div>
        <lightning-record-edit-form object-api-name={objectName} record-id="003IR00001f4sd7YAA">

           <lightning-input-field field-name={fields.accountField}></lightning-input-field>
           <lightning-input-field field-name={fields.nameField}></lightning-input-field>
           <lightning-input-field field-name={fields.titleField}></lightning-input-field>
           <lightning-input-field field-name={fields.phoneField}></lightning-input-field> 
           <label>Custom Label Email</label>

           <lightning-input-field variant="label-hidden" field-name={fields.emailField}></lightning-input-field> 
            
           <lightning-button variant="brand" label="Reset" title="reset" type="submit"  class="slds-m-left_x-small" onclick={handleReset}></lightning-button>
       
           <lightning-button variant="brand" label="Save" title="Save" type="submit"  class="slds-m-left_x-small"></lightning-button>
        </lightning-record-edit-form>
    </lightning-card>
</template>
