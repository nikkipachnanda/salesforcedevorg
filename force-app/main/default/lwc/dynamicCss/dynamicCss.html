<template>
    <lightning-card  variant="Narrow"  title="Hello" icon-name="standard:account">
        <lightning-button-icon  icon-name="utility:down" variant="border-filled" alternative-text="Show More" slot="actions"></lightning-button-icon>
       
       <lightning-input type="text" variant="standard" name="number" label="percentage" value={percent} placeholder="type here..." onkeyup={changeHandler}></lightning-input>
        <p class="slds-notify slds-notify_alert" style={percentage}>Progress</p>
        <p slot="footer">Card Footer</p>
    </lightning-card>
</template>
