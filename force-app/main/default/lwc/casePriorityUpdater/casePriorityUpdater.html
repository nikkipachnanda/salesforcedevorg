<template>
    <lightning-card title="Recent Cases" icon-name="standard:case">
        <div class="case-updater">
            <template lwc:if={isLoading}>
                <lightning-spinner alternative-text="Loading Cases" size="medium"></lightning-spinner>
            </template>

            <template lwc:if={hasCases}>
                <p class="instructions">Select a Case, choose its new Priority, and save.</p>

                <lightning-datatable
                    key-field="Id"
                    data={cases}
                    columns={columns}
                    max-row-selection="1"
                    selected-rows={selectedRows}
                    onrowselection={handleRowSelection}
                ></lightning-datatable>

                <div class="actions">
                    <lightning-combobox
                        name="priority"
                        label="Priority"
                        value={selectedPriority}
                        options={priorityOptions}
                        placeholder="Select Priority"
                        onchange={handlePriorityChange}
                        disabled={isLoading}
                    ></lightning-combobox>

                    <lightning-button
                        label="Save"
                        variant="brand"
                        onclick={handleSave}
                        disabled={isSaveDisabled}
                    ></lightning-button>
                </div>
            </template>

            <template lwc:else>
                <template lwc:if={isLoading}></template>
                <template lwc:else>
                    <div class="empty-state">No Cases found.</div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
