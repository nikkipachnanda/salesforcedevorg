<template>
    <div onclick={handleClick}>
        <div class="content">
           <img src={car.Picture_URL__c} 
           class="slds-align_absolute-center carImage"
            />
            <div> 
                <p class="title slds-align_absolute-center">
                   {car.Name} 
                </p>        
                <p class="slds-align_absolute-center">
                    MSPR:
                   <lightning-formatted-number 
                   format-style="currency"
                   currency-code="USD"
                   value={car.MSRP__c}
                   class="price"
                   maximum-fracton-digits="0">
                   </lightning-formatted-number>     
                </p>              
            </div>
        </div>     
    </div>    
</template>
